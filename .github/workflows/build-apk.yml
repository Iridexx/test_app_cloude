name: Build CryptoWatch APK

on:
  push:
    branches:
      - claude/crypto-price-monitor-app-RpMFm
      - claude/apk-build-status-um6NQ
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze npm
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Copia asset web in Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/. android/app/src/main/assets/public/

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configura ANDROID_HOME
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Installa Android 35
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepara gradlew
        run: |
          sed -i 's/\r$//' android/gradlew
          chmod +x android/gradlew
          java -version
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls android/

      - name: Build APK debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CryptoWatch-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
