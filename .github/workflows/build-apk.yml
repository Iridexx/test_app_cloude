name: Build CryptoWatch APK

on:
  push:
    branches:
      - claude/crypto-price-monitor-app-RpMFm
      - claude/gradlew-missing-build-pYXQT
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Installa dipendenze npm
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor assets in Android
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK debug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: CryptoWatch-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
